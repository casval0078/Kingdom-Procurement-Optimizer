<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>キングダム覇道 調達最適化ツール</title>

    <link rel="stylesheet" href="style.css">

    <!-- SheetJS -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>

<header>
    <h1>キングダム覇道 調達最適化ツール</h1>
    <p>
        Excelを読み込むだけで、3部隊の最低調達値が最大となる最適編成を計算します。
    </p>
</header>

<main>

    <!-- Excel読込 -->
    <section class="card">

        <h2>① Excel読込</h2>

        <input
            type="file"
            id="excelFile"
            accept=".xlsx,.xls">

        <div id="dropArea">
            Excelファイルをここへドラッグ＆ドロップ
        </div>

        <div id="fileName">
            ファイル未選択
        </div>

    </section>

    <!-- 武将一覧 -->
    <section class="card">

        <h2>② 武将一覧</h2>

        <div id="generalList">

            <p class="empty">
                Excelを読み込むと武将一覧が表示されます。
            </p>

        </div>

    </section>

    <!-- データ確認 -->
    <section class="card">

        <h2>③ データ確認</h2>

        <table id="summaryTable">

            <thead>

            <tr>
                <th>武将数</th>
                <th>使用人数</th>
                <th>除外人数</th>
            </tr>

            </thead>

            <tbody>

            <tr>

                <td id="generalCount">0</td>

                <td id="useCount">0</td>

                <td id="removeCount">0</td>

            </tr>

            </tbody>

        </table>

    </section>

    <!-- 最適化 -->
    <section class="card">

        <h2>④ 最適化</h2>

        <button
                id="optimizeButton"
                disabled>

            最適化開始

        </button>

        <p class="note">

            ※現在は開発中です。<br>
            次回から完全探索アルゴリズムを追加します。

        </p>

    </section>

    <!-- 結果 -->
    <section class="card">

        <h2>結果</h2>

        <div id="resultArea">

            <p class="empty">

                最適化するとここへ結果が表示されます。

            </p>

        </div>

    </section>

</main>

<footer>

    Kingdom Procurement Optimizer
    Version 0.1.0

</footer>

<script src="js/parser.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
