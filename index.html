<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>キングダム覇道 魅力最適化ツール</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>キングダム覇道 魅力最適化ツール</h1>

    <!-- 武将登録 -->

    <section class="panel">

        <div class="panel-title">
            武将登録・編集
        </div>

        <div class="edit-area">

            <input id="name" type="text" placeholder="武将名">

            <input id="charm" type="number" placeholder="魅力">

            <input class="trait" placeholder="個性①">
            <input class="trait" placeholder="個性②">
            <input class="trait" placeholder="個性③">
            <input class="trait" placeholder="個性④">
            <input class="trait" placeholder="個性⑤">
            <input class="trait" placeholder="個性⑥">

            <button id="saveWarrior">
                武将登録
            </button>

        </div>

    </section>

    <!-- 武将一覧 -->

    <section class="panel">

        <div class="panel-title">
            登録済み武将
        </div>

        <table>

            <thead>

            <tr>

                <th>武将名</th>
                <th>魅力</th>
                <th>編集</th>
                <th>削除</th>

            </tr>

            </thead>

            <tbody id="warriorBody">

            </tbody>

        </table>

    </section>

    <div class="button-area">

        <button id="optimizeBtn">

            最適編成を計算

        </button>

    </div>

    <!-- 結果 -->

    <section class="result-panel">

        <h2>最適編成</h2>

        <div class="teams">

            <!-- 部隊1 -->

            <div class="team">

                <h3>部隊①</h3>

                <div class="triangle">

                    <div class="center" id="t1-center">-</div>

                    <div class="bottom">

                        <div class="left" id="t1-left">-</div>

                        <div class="right" id="t1-right">-</div>

                    </div>

                </div>

                <div class="stats">

                    <p>基礎魅力：
                        <span id="t1-base">0</span>
                    </p>

                    <p>ボーナス：
                        <span id="t1-bonus">0%</span>
                    </p>

                    <p>最終魅力：
                        <span id="t1-final">0</span>
                    </p>

                </div>

                <div class="traits" id="t1-traits">

                </div>

            </div>

            <!-- 部隊2 -->

            <div class="team">

                <h3>部隊②</h3>

                <div class="triangle">

                    <div class="center" id="t2-center">-</div>

                    <div class="bottom">

                        <div class="left" id="t2-left">-</div>

                        <div class="right" id="t2-right">-</div>

                    </div>

                </div>

                <div class="stats">

                    <p>基礎魅力：
                        <span id="t2-base">0</span>
                    </p>

                    <p>ボーナス：
                        <span id="t2-bonus">0%</span>
                    </p>

                    <p>最終魅力：
                        <span id="t2-final">0</span>
                    </p>

                </div>

                <div class="traits" id="t2-traits">

                </div>

            </div>

            <!-- 部隊3 -->

            <div class="team">

                <h3>部隊③</h3>

                <div class="triangle">

                    <div class="center" id="t3-center">-</div>

                    <div class="bottom">

                        <div class="left" id="t3-left">-</div>

                        <div class="right" id="t3-right">-</div>

                    </div>

                </div>

                <div class="stats">

                    <p>基礎魅力：
                        <span id="t3-base">0</span>
                    </p>

                    <p>ボーナス：
                        <span id="t3-bonus">0%</span>
                    </p>

                    <p>最終魅力：
                        <span id="t3-final">0</span>
                    </p>

                </div>

                <div class="traits" id="t3-traits">

                </div>

            </div>

        </div>

    </section>

    <section class="summary">

        <table>

            <tr>

                <td>最低魅力</td>

                <td id="lowestCharm">

                    0

                </td>

            </tr>

            <tr>

                <td>平均魅力</td>

                <td id="averageCharm">

                    0

                </td>

            </tr>

        </table>

    </section>

</div>

<script src="app.js"></script>

</body>

</html>
